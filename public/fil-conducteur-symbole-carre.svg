<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Symbole Fil Conducteur</title>
  <desc id="desc">Symbole carré extrait du logo Fil Conducteur, sans texte.</desc>
  <defs>
