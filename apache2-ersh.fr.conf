# =========================
# HTTP -> HTTPS (WWW et APEX)
# =========================
<VirtualHost *:80>
    ServerName www.ersh.fr
    ServerAlias ersh.fr
    DocumentRoot /var/www/ersh.fr

    # ACME HTTP-01
    Alias /.well-known/acme-challenge/ "/var/www/ersh.fr/.well-known/acme-challenge/"
    <Directory "/var/www/ersh.fr/.well-known/acme-challenge/">
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    Redirect permanent / https://www.ersh.fr/
</VirtualHost>

# =========================
# HTTPS : www.ersh.fr
# =========================
<VirtualHost *:443>
    ServerName www.ersh.fr
    ServerAlias www.ersh.fr
    DocumentRoot /var/www/ersh.fr

    <Directory /var/www/ersh.fr>
        Options -Indexes
        AllowOverride FileInfo
        Require all granted
    </Directory>

    # TLS
    SSLEngine on
    IncludeOptional /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/www.ersh.fr-0001/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/www.ersh.fr-0001/privkey.pem

    # Reverse proxy backend
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s

    ProxyPass /api/ http://127.0.0.1:5000/api/ retry=0 timeout=60
    ProxyPassReverse /api/ http://127.0.0.1:5000/api/

    # Fil Conducteur API
    ProxyPass /openapi.json http://127.0.0.1:5100/openapi.json retry=0 timeout=60
    ProxyPassReverse /openapi.json http://127.0.0.1:5100/openapi.json
    ProxyPass /fc/ http://127.0.0.1:5100/ retry=0 timeout=60
    ProxyPassReverse /fc/ http://127.0.0.1:5100/
    ProxyPass /fc http://127.0.0.1:5100 retry=0 timeout=60
    ProxyPassReverse /fc http://127.0.0.1:5100

    # Static asset MIME types
    AddType text/css .css
    AddType application/javascript .js .mjs
    AddType application/wasm .wasm
    AddType image/x-icon .ico

    # SPA rewrites
    RewriteEngine On

    # Never rewrite static assets to index.html. Missing assets must return 404.
    RewriteRule ^/assets/ - [END]
    RewriteRule ^/favicon\.ico$ - [END]

    # Let API, Fil Conducteur API, ACME and OpenAPI requests pass through.
    RewriteCond %{REQUEST_URI} ^/api/ [OR]
    RewriteCond %{REQUEST_URI} ^/fc(/|$) [OR]
    RewriteCond %{REQUEST_URI} ^/\.well-known/acme-challenge/ [OR]
    RewriteCond %{REQUEST_URI} ^/openapi\.json$
    RewriteRule ^ - [END]

    # Serve existing files and directories directly.
    RewriteCond %{REQUEST_FILENAME} -f [OR]
    RewriteCond %{REQUEST_FILENAME} -d
    RewriteRule ^ - [END]

    # React Router fallback.
    RewriteRule ^ /index.html [END]

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=()"
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"

    ErrorLog ${APACHE_LOG_DIR}/ersh-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/ersh-ssl-access.log combined
</VirtualHost>

# =========================
# HTTPS : APEX -> WWW
# =========================
<VirtualHost *:443>
    ServerName ersh.fr

    SSLEngine on
    IncludeOptional /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/www.ersh.fr/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/www.ersh.fr/privkey.pem

    Redirect permanent / https://www.ersh.fr/
</VirtualHost>
